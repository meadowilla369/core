name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Validate migration policy
        run: ./scripts/validate-migrations.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Contracts tests (offline)
        run: npm run contracts:test

      - name: Build
        run: npm run build

      - name: Sign artifacts (checksum manifest)
        run: ./scripts/sign-artifacts.sh

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-signatures
          path: artifacts/signatures/checksums.sha256
