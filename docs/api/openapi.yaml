openapi: 3.1.0
info:
  title: Ticket Platform API
  version: 0.1.0
  description: |
    Initial API contract for gateway public endpoints and internal service endpoints.
servers:
  - url: https://api.example.com
    description: Public API Gateway
  - url: http://localhost:3000
    description: Local API Gateway

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: KYC
  - name: Events
  - name: Tickets

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Gateway health check
      responses:
        "200":
          description: Healthy

  /readyz:
    get:
      tags: [Health]
      summary: Gateway readiness check
      responses:
        "200":
          description: All upstream services are ready
        "503":
          description: One or more upstream services are not ready

  /v1/auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP for phone login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequestInput"
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"
        "400":
          description: Invalid phone
        "429":
          description: Rate limited

  /v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue access/refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid or expired OTP

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid refresh token

  /v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Missing user context
    put:
      tags: [Users]
      summary: Update current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/users/me/email:
    post:
      tags: [Users]
      summary: Set or update user email and trigger verification
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEmailInput"
      responses:
        "200":
          description: Verification request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEmailResponse"
        "400":
          description: Invalid email
        "401":
          description: Missing user context

  /v1/users/me/devices:
    get:
      tags: [Users]
      summary: List user devices
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDevicesResponse"
        "401":
          description: Missing user context

  /v1/users/me/devices/{deviceId}:
    delete:
      tags: [Users]
      summary: Revoke a user device
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device revoked
        "400":
          description: Cannot revoke current device
        "401":
          description: Missing user context
        "404":
          description: Device not found

  /v1/kyc/initiate:
    post:
      tags: [KYC]
      summary: Initiate KYC flow for current user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInitiateInput"
      responses:
        "200":
          description: KYC flow initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/kyc/upload:
    post:
      tags: [KYC]
      summary: Upload identity documents for KYC
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUploadInput"
      responses:
        "200":
          description: Documents uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/face-match:
    post:
      tags: [KYC]
      summary: Submit selfie and face match scores
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycFaceMatchInput"
      responses:
        "200":
          description: Face match processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/status:
    get:
      tags: [KYC]
      summary: Get current KYC status for user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/events:
    get:
      tags: [Events]
      summary: List events
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /v1/events/{eventId}:
    get:
      tags: [Events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/ticket-types:
    get:
      tags: [Events]
      summary: Get ticket types for event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket type list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketTypeListResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/availability:
    get:
      tags: [Events]
      summary: Get real-time event ticket availability
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAvailabilityResponse"
        "404":
          description: Event not found

  /v1/tickets/reserve:
    post:
      tags: [Tickets]
      summary: Reserve tickets for an event
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReserveInput"
      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReserveResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/tickets/purchase:
    post:
      tags: [Tickets]
      summary: Mark reservation as paid and issue mock tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPurchaseInput"
      responses:
        "200":
          description: Purchase processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPurchaseResponse"
        "400":
          description: Invalid state
        "401":
          description: Missing user context
        "404":
          description: Reservation not found

  /v1/tickets/me:
    get:
      tags: [Tickets]
      summary: List current user tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
        "401":
          description: Missing user context

  /v1/tickets/{tokenId}:
    get:
      tags: [Tickets]
      summary: Get ticket detail
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

  /v1/tickets/{tokenId}/qr:
    post:
      tags: [Tickets]
      summary: Generate rotating QR payload for ticket
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketQrResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

components:
  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
      description: Simulated user identity header used by current skeleton.
    IdempotencyKey:
      name: idempotency-key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for mutation endpoints.

  schemas:
    OtpRequestInput:
      type: object
      properties:
        phone:
          type: string
      required: [phone]

    OtpRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            requestId:
              type: string
            expiresIn:
              type: integer
            retryAfter:
              type: integer
            otpCode:
              type: string

    OtpVerifyInput:
      type: object
      properties:
        phone:
          type: string
        requestId:
          type: string
        otp:
          type: string
      required: [phone, requestId, otp]

    RefreshInput:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            accessTokenExpiresAt:
              type: string
              format: date-time
            refreshToken:
              type: string
            refreshTokenExpiresAt:
              type: string
              format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: string
        phoneNumber:
          type: string
        fullName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        isFrozen:
          type: boolean
        freezeReason:
          type: string
        updatedAt:
          type: string
          format: date-time

    UserProfileUpdateInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string

    UserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserProfile"

    UserEmailInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    UserEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            email:
              type: string
            verificationSent:
              type: boolean

    UserDevice:
      type: object
      properties:
        id:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        isCurrent:
          type: boolean
        revokedAt:
          type: string
          format: date-time
        revokedReason:
          type: string
        lastActiveAt:
          type: string
          format: date-time

    UserDevicesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserDevice"

    KycInitiateInput:
      type: object
      properties:
        provider:
          type: string

    KycUploadInput:
      type: object
      properties:
        cccdNumber:
          type: string
        frontImageRef:
          type: string
        backImageRef:
          type: string
      required: [frontImageRef, backImageRef]

    KycFaceMatchInput:
      type: object
      properties:
        selfieImageRef:
          type: string
        livenessScore:
          type: number
          minimum: 0
          maximum: 1
        faceMatchScore:
          type: number
          minimum: 0
          maximum: 1
      required: [selfieImageRef, livenessScore, faceMatchScore]

    KycStatusData:
      type: object
      properties:
        kycId:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [pending, document_uploaded, in_review, approved, rejected]
        cccdNumber:
          type: string
        livenessScore:
          type: number
        faceMatchScore:
          type: number
        rejectionReason:
          type: string
        updatedAt:
          type: string
          format: date-time

    KycStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/KycStatusData"

    EventSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        city:
          type: string
        venue:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, cancelled]

    TicketType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        soldCount:
          type: integer

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/EventSummary"
        - type: object
          properties:
            ticketTypes:
              type: array
              items:
                $ref: "#/components/schemas/TicketType"

    EventAvailabilityItem:
      type: object
      properties:
        ticketTypeId:
          type: string
        available:
          type: integer
        sold:
          type: integer
        quantity:
          type: integer

    EventListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/EventSummary"

    EventDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/EventDetail"

    TicketTypeListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/TicketType"

    EventAvailabilityResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/EventAvailabilityItem"

    TicketReserveInput:
      type: object
      properties:
        eventId:
          type: string
        ticketTypeId:
          type: string
        quantity:
          type: integer
      required: [eventId, ticketTypeId, quantity]

    TicketPurchaseInput:
      type: object
      properties:
        reservationId:
          type: string
        paymentMethod:
          type: string
      required: [reservationId, paymentMethod]

    TicketRecord:
      type: object
      properties:
        tokenId:
          type: string
        eventId:
          type: string
        ticketTypeId:
          type: string
        ownerUserId:
          type: string
        seatInfo:
          type: string
        reservationId:
          type: string
        createdAt:
          type: string
          format: date-time

    TicketReserveResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            reservationId:
              type: string
            eventId:
              type: string
            ticketTypeId:
              type: string
            quantity:
              type: integer
            totalAmount:
              type: number
            status:
              type: string
            expiresAt:
              type: string
              format: date-time

    TicketPurchaseResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            reservationId:
              type: string
            paymentIntentId:
              type: string
            status:
              type: string
            ticketsIssued:
              type: integer

    TicketListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/TicketRecord"

    TicketDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/TicketRecord"

    TicketQrResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            tokenId:
              type: string
            eventId:
              type: string
            timestamp:
              type: integer
            nonce:
              type: string
            walletAddress:
              type: string
            signature:
              type: string
