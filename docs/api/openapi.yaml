openapi: 3.1.0
info:
  title: Ticket Platform API
  version: 0.1.0
  description: |
    Initial API contract for gateway public endpoints and internal service endpoints.
servers:
  - url: https://api.example.com
    description: Public API Gateway
  - url: http://localhost:3000
    description: Local API Gateway

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: KYC
  - name: Events
  - name: Tickets
  - name: Marketplace
  - name: CheckIn
  - name: Refunds
  - name: Recovery
  - name: Disputes
  - name: Notifications
  - name: Payments
  - name: Webhooks

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Gateway health check
      responses:
        "200":
          description: Healthy

  /readyz:
    get:
      tags: [Health]
      summary: Gateway readiness check
      responses:
        "200":
          description: All upstream services are ready
        "503":
          description: One or more upstream services are not ready

  /v1/auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP for phone login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequestInput"
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"
        "400":
          description: Invalid phone
        "429":
          description: Rate limited

  /v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue access/refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid or expired OTP

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid refresh token

  /v1/auth/sessions:
    get:
      tags: [Auth]
      summary: List user auth sessions/devices
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionListResponse"
        "401":
          description: Missing user context

  /v1/auth/sessions/{sessionId}:
    delete:
      tags: [Auth]
      summary: Revoke one auth session/device
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session revoked
        "401":
          description: Missing user context
        "403":
          description: Forbidden
        "404":
          description: Session not found

  /v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Missing user context
    put:
      tags: [Users]
      summary: Update current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/users/me/email:
    post:
      tags: [Users]
      summary: Set or update user email and trigger verification
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEmailInput"
      responses:
        "200":
          description: Verification request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEmailResponse"
        "400":
          description: Invalid email
        "401":
          description: Missing user context

  /v1/users/me/devices:
    get:
      tags: [Users]
      summary: List user devices
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDevicesResponse"
        "401":
          description: Missing user context

  /v1/users/me/devices/{deviceId}:
    delete:
      tags: [Users]
      summary: Revoke a user device
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device revoked
        "400":
          description: Cannot revoke current device
        "401":
          description: Missing user context
        "404":
          description: Device not found

  /v1/kyc/initiate:
    post:
      tags: [KYC]
      summary: Initiate KYC flow for current user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInitiateInput"
      responses:
        "200":
          description: KYC flow initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/kyc/upload:
    post:
      tags: [KYC]
      summary: Upload identity documents for KYC
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUploadInput"
      responses:
        "200":
          description: Documents uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/face-match:
    post:
      tags: [KYC]
      summary: Submit selfie and face match scores
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycFaceMatchInput"
      responses:
        "200":
          description: Face match processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/status:
    get:
      tags: [KYC]
      summary: Get current KYC status for user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/events:
    get:
      tags: [Events]
      summary: List events
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /v1/events/{eventId}:
    get:
      tags: [Events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/ticket-types:
    get:
      tags: [Events]
      summary: Get ticket types for event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket type list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketTypeListResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/availability:
    get:
      tags: [Events]
      summary: Get real-time event ticket availability
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAvailabilityResponse"
        "404":
          description: Event not found

  /v1/tickets/reserve:
    post:
      tags: [Tickets]
      summary: Reserve tickets for an event
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReserveInput"
      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReserveResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/tickets/purchase:
    post:
      tags: [Tickets]
      summary: Mark reservation as paid and issue mock tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPurchaseInput"
      responses:
        "200":
          description: Purchase processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPurchaseResponse"
        "400":
          description: Invalid state
        "401":
          description: Missing user context
        "404":
          description: Reservation not found

  /v1/tickets/me:
    get:
      tags: [Tickets]
      summary: List current user tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
        "401":
          description: Missing user context

  /v1/tickets/{tokenId}:
    get:
      tags: [Tickets]
      summary: Get ticket detail
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

  /v1/tickets/{tokenId}/qr:
    post:
      tags: [Tickets]
      summary: Generate rotating QR payload for ticket
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketQrResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

  /v1/marketplace/listings:
    get:
      tags: [Marketplace]
      summary: Browse resale listings
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Listing collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingListResponse"
    post:
      tags: [Marketplace]
      summary: Create resale listing (requires KYC)
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/XKycStatus"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceCreateListingInput"
      responses:
        "200":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context
        "403":
          description: KYC not approved
        "409":
          description: Token already listed

  /v1/marketplace/listings/{listingId}:
    delete:
      tags: [Marketplace]
      summary: Cancel resale listing
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingResponse"
        "401":
          description: Missing user context
        "403":
          description: Only seller can cancel
        "404":
          description: Listing not found

  /v1/marketplace/listings/{listingId}/purchase:
    post:
      tags: [Marketplace]
      summary: Purchase resale listing and build escrow settlement payload
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplacePurchaseInput"
      responses:
        "200":
          description: Purchase accepted and settlement trigger queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplacePurchaseResponse"
        "400":
          description: Invalid payload or listing not active
        "401":
          description: Missing user context
        "404":
          description: Listing not found

  /v1/marketplace/me/sales:
    get:
      tags: [Marketplace]
      summary: List seller completed sales
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Completed sales list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSalesResponse"
        "401":
          description: Missing user context

  /v1/internal/marketplace/settlements/finalize:
    post:
      tags: [Marketplace]
      summary: Internal settlement finalization and submit trigger
      parameters:
        - $ref: "#/components/parameters/InternalApiKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceSettlementFinalizeInput"
      responses:
        "200":
          description: Settlement submitted or returned from idempotent ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSettlementFinalizeResponse"
        "400":
          description: Invalid settlement payload
        "401":
          description: Invalid internal API key

  /v1/checkin/verify:
    post:
      tags: [CheckIn]
      summary: Verify QR signature and perform first-scan-wins check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinVerifyInput"
      responses:
        "200":
          description: Check-in verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinVerifyResponse"
        "400":
          description: Invalid payload

  /v1/checkin/events/{eventId}/stats:
    get:
      tags: [CheckIn]
      summary: Get check-in metrics for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event check-in stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinStatsResponse"

  /v1/checkin/events/{eventId}/gates:
    get:
      tags: [CheckIn]
      summary: Get gate-level check-in counts for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event gates check-in stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinGatesResponse"

  /v1/refunds/requests:
    post:
      tags: [Refunds]
      summary: Create refund request for cancelled or postponed event
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundCreateInput"
      responses:
        "200":
          description: Refund request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundDetailResponse"
        "400":
          description: Invalid or ineligible request
        "401":
          description: Missing user context
        "409":
          description: Refund already requested

  /v1/refunds/me:
    get:
      tags: [Refunds]
      summary: List current user refund requests
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Refund request list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundListResponse"
        "401":
          description: Missing user context

  /v1/refunds/{refundId}:
    get:
      tags: [Refunds]
      summary: Get refund request details
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundDetailResponse"
        "404":
          description: Refund request not found

  /v1/refunds/sync:
    post:
      tags: [Refunds]
      summary: Trigger one payout sync cycle for queued refunds
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundSyncResponse"

  /v1/recovery/initiate:
    post:
      tags: [Recovery]
      summary: Initiate account recovery
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryInitiateInput"
      responses:
        "200":
          description: Recovery initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryDetailResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context
        "409":
          description: Recovery already active

  /v1/recovery/verify:
    post:
      tags: [Recovery]
      summary: Submit one recovery verification channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryVerifyInput"
      responses:
        "200":
          description: Verification accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryDetailResponse"
        "400":
          description: Invalid payload or state
        "404":
          description: Recovery not found

  /v1/recovery/{recoveryId}/status:
    get:
      tags: [Recovery]
      summary: Get recovery status
      parameters:
        - name: recoveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recovery status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryDetailResponse"
        "404":
          description: Recovery not found

  /v1/recovery/{recoveryId}/cancel:
    post:
      tags: [Recovery]
      summary: Cancel active recovery request
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: recoveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recovery cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryDetailResponse"
        "401":
          description: Missing user context
        "403":
          description: Not request owner
        "404":
          description: Recovery not found

  /v1/recovery/{recoveryId}/rotate-guardian:
    post:
      tags: [Recovery]
      summary: Complete guardian rotation after hold period
      parameters:
        - name: recoveryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryRotateGuardianInput"
      responses:
        "200":
          description: Guardian rotated and recovery completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryRotateGuardianResponse"
        "400":
          description: Hold not finished or invalid payload
        "404":
          description: Recovery not found

  /v1/disputes:
    post:
      tags: [Disputes]
      summary: File a new dispute case
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeCreateInput"
      responses:
        "200":
          description: Dispute created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetailResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/disputes/me:
    get:
      tags: [Disputes]
      summary: List disputes filed by current user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Dispute list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeListResponse"
        "401":
          description: Missing user context

  /v1/disputes/{disputeId}:
    get:
      tags: [Disputes]
      summary: Get dispute detail, messages, and audit trail
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dispute detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeExpandedResponse"
        "403":
          description: Not allowed to access dispute
        "404":
          description: Dispute not found

  /v1/disputes/{disputeId}/messages:
    post:
      tags: [Disputes]
      summary: Add message to dispute thread
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeMessageInput"
      responses:
        "200":
          description: Message appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeMessageResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context
        "403":
          description: Not allowed to post
        "404":
          description: Dispute not found

  /v1/disputes/{disputeId}/escalate:
    post:
      tags: [Disputes]
      summary: Escalate dispute to next support tier
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeEscalateInput"
      responses:
        "200":
          description: Dispute escalated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetailResponse"
        "400":
          description: Max tier reached or invalid state
        "401":
          description: Missing user context
        "403":
          description: Not allowed to escalate
        "404":
          description: Dispute not found

  /v1/internal/disputes/{disputeId}/moderate:
    post:
      tags: [Disputes]
      summary: Internal support moderation action for dispute
      parameters:
        - $ref: "#/components/parameters/InternalApiKey"
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeModerationInput"
      responses:
        "200":
          description: Dispute moderated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetailResponse"
        "400":
          description: Invalid moderation payload
        "401":
          description: Invalid internal API key
        "404":
          description: Dispute not found

  /v1/notifications/templates:
    get:
      tags: [Notifications]
      summary: List available notification templates
      responses:
        "200":
          description: Notification templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationTemplateListResponse"

  /v1/notifications/send:
    post:
      tags: [Notifications]
      summary: Queue direct notification message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSendInput"
      responses:
        "200":
          description: Notification queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationDetailResponse"
        "400":
          description: Invalid payload

  /v1/notifications/events:
    post:
      tags: [Notifications]
      summary: Trigger template-based notifications from an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationEventInput"
      responses:
        "200":
          description: Notifications queued from template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "400":
          description: Invalid payload
        "404":
          description: Template not found

  /v1/notifications/me:
    get:
      tags: [Notifications]
      summary: List current user notifications
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: User notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "401":
          description: Missing user context

  /v1/payments/intents:
    post:
      tags: [Payments]
      summary: Create payment intent for reserved tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentInput"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Get payment status by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentDetailResponse"
        "404":
          description: Payment not found

  /v1/payments/reconciliation/jobs:
    get:
      tags: [Payments]
      summary: List pending webhook retry jobs
      responses:
        "200":
          description: Retry jobs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJobsResponse"

  /v1/payments/reconciliation/run:
    post:
      tags: [Payments]
      summary: Process due webhook retry jobs once
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Reconciliation run summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationRunResponse"

  /v1/webhooks/momo:
    post:
      tags: [Webhooks]
      summary: Receive payment confirmation webhook from Momo
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookInput"
      responses:
        "200":
          description: Webhook processed or duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "202":
          description: Webhook queued for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "400":
          description: Invalid payload
        "401":
          description: Signature verification failed

  /v1/webhooks/vnpay:
    post:
      tags: [Webhooks]
      summary: Receive payment confirmation webhook from VNPAY
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookInput"
      responses:
        "200":
          description: Webhook processed or duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "202":
          description: Webhook queued for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "400":
          description: Invalid payload
        "401":
          description: Signature verification failed

components:
  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
      description: Simulated user identity header used by current skeleton.
    XKycStatus:
      name: x-kyc-status
      in: header
      required: false
      schema:
        type: string
      description: Simulated KYC status header. Listing creation requires `approved`.
    IdempotencyKey:
      name: idempotency-key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for mutation endpoints.
    WebhookSignature:
      name: x-webhook-signature
      in: header
      required: true
      schema:
        type: string
      description: Hex HMAC SHA-256 signature of `${timestamp}.${nonce}.${rawBody}`.
    WebhookTimestamp:
      name: x-webhook-timestamp
      in: header
      required: true
      schema:
        type: string
      description: Unix timestamp in seconds or milliseconds.
    WebhookNonce:
      name: x-webhook-nonce
      in: header
      required: true
      schema:
        type: string
      description: Unique nonce to prevent webhook replay.
    InternalApiKey:
      name: x-internal-api-key
      in: header
      required: true
      schema:
        type: string
      description: Internal service-to-service API key.

  schemas:
    OtpRequestInput:
      type: object
      properties:
        phone:
          type: string
      required: [phone]

    OtpRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            requestId:
              type: string
            expiresIn:
              type: integer
            retryAfter:
              type: integer
            otpCode:
              type: string

    OtpVerifyInput:
      type: object
      properties:
        phone:
          type: string
        requestId:
          type: string
        otp:
          type: string
        deviceId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
      required: [phone, requestId, otp]

    RefreshInput:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            userId:
              type: string
            sessionId:
              type: string
            accessToken:
              type: string
            accessTokenExpiresAt:
              type: string
              format: date-time
            refreshToken:
              type: string
            refreshTokenExpiresAt:
              type: string
              format: date-time

    AuthSession:
      type: object
      properties:
        sessionId:
          type: string
        phone:
          type: string
        deviceId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time

    AuthSessionListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuthSession"

    UserProfile:
      type: object
      properties:
        id:
          type: string
        phoneNumber:
          type: string
        fullName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        isFrozen:
          type: boolean
        freezeReason:
          type: string
        updatedAt:
          type: string
          format: date-time

    UserProfileUpdateInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string

    UserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserProfile"

    UserEmailInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    UserEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            email:
              type: string
            verificationSent:
              type: boolean

    UserDevice:
      type: object
      properties:
        id:
          type: string
        deviceName:
          type: string
        platform:
          type: string
