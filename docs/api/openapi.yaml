openapi: 3.1.0
info:
  title: Ticket Platform API
  version: 0.1.0
  description: |
    Initial API contract for gateway public endpoints and internal service endpoints.
servers:
  - url: https://api.example.com
    description: Public API Gateway
  - url: http://localhost:3000
    description: Local API Gateway

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: KYC
  - name: Events
  - name: Tickets
  - name: Marketplace
  - name: CheckIn
  - name: Payments
  - name: Webhooks

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Gateway health check
      responses:
        "200":
          description: Healthy

  /readyz:
    get:
      tags: [Health]
      summary: Gateway readiness check
      responses:
        "200":
          description: All upstream services are ready
        "503":
          description: One or more upstream services are not ready

  /v1/auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP for phone login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequestInput"
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"
        "400":
          description: Invalid phone
        "429":
          description: Rate limited

  /v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue access/refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid or expired OTP

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid payload
        "401":
          description: Invalid refresh token

  /v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Missing user context
    put:
      tags: [Users]
      summary: Update current user profile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/users/me/email:
    post:
      tags: [Users]
      summary: Set or update user email and trigger verification
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEmailInput"
      responses:
        "200":
          description: Verification request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEmailResponse"
        "400":
          description: Invalid email
        "401":
          description: Missing user context

  /v1/users/me/devices:
    get:
      tags: [Users]
      summary: List user devices
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDevicesResponse"
        "401":
          description: Missing user context

  /v1/users/me/devices/{deviceId}:
    delete:
      tags: [Users]
      summary: Revoke a user device
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device revoked
        "400":
          description: Cannot revoke current device
        "401":
          description: Missing user context
        "404":
          description: Device not found

  /v1/kyc/initiate:
    post:
      tags: [KYC]
      summary: Initiate KYC flow for current user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInitiateInput"
      responses:
        "200":
          description: KYC flow initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/kyc/upload:
    post:
      tags: [KYC]
      summary: Upload identity documents for KYC
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUploadInput"
      responses:
        "200":
          description: Documents uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/face-match:
    post:
      tags: [KYC]
      summary: Submit selfie and face match scores
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycFaceMatchInput"
      responses:
        "200":
          description: Face match processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/kyc/status:
    get:
      tags: [KYC]
      summary: Get current KYC status for user
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"
        "401":
          description: Missing user context

  /v1/events:
    get:
      tags: [Events]
      summary: List events
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /v1/events/{eventId}:
    get:
      tags: [Events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/ticket-types:
    get:
      tags: [Events]
      summary: Get ticket types for event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket type list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketTypeListResponse"
        "404":
          description: Event not found

  /v1/events/{eventId}/availability:
    get:
      tags: [Events]
      summary: Get real-time event ticket availability
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAvailabilityResponse"
        "404":
          description: Event not found

  /v1/tickets/reserve:
    post:
      tags: [Tickets]
      summary: Reserve tickets for an event
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReserveInput"
      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReserveResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/tickets/purchase:
    post:
      tags: [Tickets]
      summary: Mark reservation as paid and issue mock tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPurchaseInput"
      responses:
        "200":
          description: Purchase processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPurchaseResponse"
        "400":
          description: Invalid state
        "401":
          description: Missing user context
        "404":
          description: Reservation not found

  /v1/tickets/me:
    get:
      tags: [Tickets]
      summary: List current user tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
        "401":
          description: Missing user context

  /v1/tickets/{tokenId}:
    get:
      tags: [Tickets]
      summary: Get ticket detail
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

  /v1/tickets/{tokenId}/qr:
    post:
      tags: [Tickets]
      summary: Generate rotating QR payload for ticket
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketQrResponse"
        "401":
          description: Missing user context
        "404":
          description: Ticket not found

  /v1/marketplace/listings:
    get:
      tags: [Marketplace]
      summary: Browse resale listings
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Listing collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingListResponse"
    post:
      tags: [Marketplace]
      summary: Create resale listing (requires KYC)
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/XKycStatus"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceCreateListingInput"
      responses:
        "200":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context
        "403":
          description: KYC not approved
        "409":
          description: Token already listed

  /v1/marketplace/listings/{listingId}:
    delete:
      tags: [Marketplace]
      summary: Cancel resale listing
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingResponse"
        "401":
          description: Missing user context
        "403":
          description: Only seller can cancel
        "404":
          description: Listing not found

  /v1/marketplace/listings/{listingId}/purchase:
    post:
      tags: [Marketplace]
      summary: Purchase resale listing and build escrow settlement payload
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplacePurchaseInput"
      responses:
        "200":
          description: Purchase accepted and settlement trigger queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplacePurchaseResponse"
        "400":
          description: Invalid payload or listing not active
        "401":
          description: Missing user context
        "404":
          description: Listing not found

  /v1/marketplace/me/sales:
    get:
      tags: [Marketplace]
      summary: List seller completed sales
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: Completed sales list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSalesResponse"
        "401":
          description: Missing user context

  /v1/checkin/verify:
    post:
      tags: [CheckIn]
      summary: Verify QR signature and perform first-scan-wins check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinVerifyInput"
      responses:
        "200":
          description: Check-in verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinVerifyResponse"
        "400":
          description: Invalid payload

  /v1/checkin/events/{eventId}/stats:
    get:
      tags: [CheckIn]
      summary: Get check-in metrics for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event check-in stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinStatsResponse"

  /v1/checkin/events/{eventId}/gates:
    get:
      tags: [CheckIn]
      summary: Get gate-level check-in counts for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event gates check-in stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinGatesResponse"

  /v1/payments/intents:
    post:
      tags: [Payments]
      summary: Create payment intent for reserved tickets
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentInput"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid payload
        "401":
          description: Missing user context

  /v1/payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Get payment status by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentDetailResponse"
        "404":
          description: Payment not found

  /v1/payments/reconciliation/jobs:
    get:
      tags: [Payments]
      summary: List pending webhook retry jobs
      responses:
        "200":
          description: Retry jobs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJobsResponse"

  /v1/payments/reconciliation/run:
    post:
      tags: [Payments]
      summary: Process due webhook retry jobs once
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Reconciliation run summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationRunResponse"

  /v1/webhooks/momo:
    post:
      tags: [Webhooks]
      summary: Receive payment confirmation webhook from Momo
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookInput"
      responses:
        "200":
          description: Webhook processed or duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "202":
          description: Webhook queued for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "400":
          description: Invalid payload
        "401":
          description: Signature verification failed

  /v1/webhooks/vnpay:
    post:
      tags: [Webhooks]
      summary: Receive payment confirmation webhook from VNPAY
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookInput"
      responses:
        "200":
          description: Webhook processed or duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "202":
          description: Webhook queued for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResponse"
        "400":
          description: Invalid payload
        "401":
          description: Signature verification failed

components:
  parameters:
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
      description: Simulated user identity header used by current skeleton.
    XKycStatus:
      name: x-kyc-status
      in: header
      required: false
      schema:
        type: string
      description: Simulated KYC status header. Listing creation requires `approved`.
    IdempotencyKey:
      name: idempotency-key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for mutation endpoints.
    WebhookSignature:
      name: x-webhook-signature
      in: header
      required: true
      schema:
        type: string
      description: Hex HMAC SHA-256 signature of `${timestamp}.${nonce}.${rawBody}`.
    WebhookTimestamp:
      name: x-webhook-timestamp
      in: header
      required: true
      schema:
        type: string
      description: Unix timestamp in seconds or milliseconds.
    WebhookNonce:
      name: x-webhook-nonce
      in: header
      required: true
      schema:
        type: string
      description: Unique nonce to prevent webhook replay.

  schemas:
    OtpRequestInput:
      type: object
      properties:
        phone:
          type: string
      required: [phone]

    OtpRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            requestId:
              type: string
            expiresIn:
              type: integer
            retryAfter:
              type: integer
            otpCode:
              type: string

    OtpVerifyInput:
      type: object
      properties:
        phone:
          type: string
        requestId:
          type: string
        otp:
          type: string
      required: [phone, requestId, otp]

    RefreshInput:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            accessTokenExpiresAt:
              type: string
              format: date-time
            refreshToken:
              type: string
            refreshTokenExpiresAt:
              type: string
              format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: string
        phoneNumber:
          type: string
        fullName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        isFrozen:
          type: boolean
        freezeReason:
          type: string
        updatedAt:
          type: string
          format: date-time

    UserProfileUpdateInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string

    UserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserProfile"

    UserEmailInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    UserEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            email:
              type: string
            verificationSent:
              type: boolean

    UserDevice:
      type: object
      properties:
        id:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        isCurrent:
          type: boolean
        revokedAt:
          type: string
          format: date-time
        revokedReason:
          type: string
        lastActiveAt:
          type: string
          format: date-time

    UserDevicesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserDevice"

    KycInitiateInput:
      type: object
      properties:
        provider:
          type: string

    KycUploadInput:
      type: object
      properties:
        cccdNumber:
          type: string
        frontImageRef:
          type: string
        backImageRef:
          type: string
      required: [frontImageRef, backImageRef]

    KycFaceMatchInput:
      type: object
      properties:
        selfieImageRef:
          type: string
        livenessScore:
          type: number
          minimum: 0
          maximum: 1
        faceMatchScore:
          type: number
          minimum: 0
          maximum: 1
      required: [selfieImageRef, livenessScore, faceMatchScore]

    KycStatusData:
      type: object
      properties:
        kycId:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [pending, document_uploaded, in_review, approved, rejected]
        cccdNumber:
          type: string
        livenessScore:
          type: number
        faceMatchScore:
          type: number
        rejectionReason:
          type: string
        updatedAt:
          type: string
          format: date-time

    KycStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/KycStatusData"

    EventSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        city:
          type: string
        venue:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, cancelled]

    TicketType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        soldCount:
          type: integer

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/EventSummary"
        - type: object
          properties:
            ticketTypes:
              type: array
              items:
                $ref: "#/components/schemas/TicketType"

    EventAvailabilityItem:
