[profile.default]
src = "core/contracts/src"
out = "core/contracts/out"
test = "core/contracts/test"
libs = ["core/contracts/lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.20"
remappings = [
    "@openzeppelin/=../lib/openzeppelin-contracts/",
    "forge-std/=../lib/forge-std/src/"
]

[fmt]
tab_width = 4
line_length = 120